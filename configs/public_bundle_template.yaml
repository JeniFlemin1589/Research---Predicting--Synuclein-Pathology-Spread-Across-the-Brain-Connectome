project:
  seed: 42
  device: null
  output_dir: outputs/public_dual_branch

data:
  artifact_dir: data/processed/public_bundle
  history_len: 3
  dynamic_features:
    - burden_norm
    - delta_burden
    - pathology_z
  static_features:
    - hnoca_cortex_prior
    - hnoca_striatum_prior
    - hnoca_midbrain_prior
    - hnoca_hindbrain_prior
  split:
    train_fraction: 0.7
    val_fraction: 0.15

model:
  name: dual_branch
  hidden_dim: 64
  heads: 2
  dropout: 0.15
  regression_head: true

training:
  batch_size: 4
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  regression_weight: 0.1

